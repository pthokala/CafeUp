# Release workflow for CafeUp.
#
# Triggered when you push a tag matching `v*.*.*`. Builds, optionally
# Developer-ID-signs and notarizes (only if those secrets are configured),
# EdDSA-signs the archive, creates a GitHub Release with the zip attached,
# and commits the updated appcast back to `main`.
#
# Required secret (always):
#   SPARKLE_ED_PRIVATE_KEY   — the ed_private_key.txt contents from
#                              Sparkle's `generate_keys -x`.
#
# Optional secrets (full Developer-ID-signed + notarized release; skipped
# when absent — falls back to an ad-hoc-signed, EdDSA-signed release):
#   DEV_ID_CERT_P12_BASE64   — base64 of your "Developer ID Application" .p12
#   DEV_ID_CERT_PASSWORD     — password for the .p12
#   KEYCHAIN_PASSWORD        — any throwaway password for the runner keychain
#   APPLE_API_KEY_ID         — App Store Connect API key id (10 chars)
#   APPLE_API_KEY_ISSUER     — issuer UUID
#   APPLE_API_KEY_P8_BASE64  — base64 of the AuthKey_XXXXXX.p8 file
#
# Ad-hoc-signed releases launch fine after a one-time Gatekeeper bypass
# (right-click → Open). Sparkle auto-update works either way as long as
# SPARKLE_ED_PRIVATE_KEY matches the SUPublicEDKey in Info.plist.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version from tag
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Decide signing mode
        id: mode
        env:
          DEV_ID_CERT_P12_BASE64: ${{ secrets.DEV_ID_CERT_P12_BASE64 }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [[ -z "$SPARKLE_ED_PRIVATE_KEY" ]]; then
            echo "✗ SPARKLE_ED_PRIVATE_KEY is required for any release." >&2
            exit 1
          fi
          if [[ -n "$DEV_ID_CERT_P12_BASE64" ]]; then
            echo "mode=devid" >> "$GITHUB_OUTPUT"
            echo "✓ Developer ID secrets present — full signed + notarized release"
          else
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
            echo "ℹ DEV_ID_CERT_P12_BASE64 absent — ad-hoc-signed, EdDSA-only release"
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages (downloads Sparkle)
        run: xcodebuild -project CafeUp.xcodeproj -scheme CafeUp -resolvePackageDependencies

      - name: Import Developer ID certificate
        if: steps.mode.outputs.mode == 'devid'
        env:
          DEV_ID_CERT_P12_BASE64: ${{ secrets.DEV_ID_CERT_P12_BASE64 }}
          DEV_ID_CERT_PASSWORD: ${{ secrets.DEV_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/cafeup-release.keychain-db"
          CERT_PATH="$RUNNER_TEMP/dev_id.p12"
          echo -n "$DEV_ID_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEV_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      - name: Archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          xcodebuild -project CafeUp.xcodeproj -scheme CafeUp -configuration Release \
            -archivePath "build/CafeUp-$VERSION.xcarchive" archive

      - name: Export Developer-ID-signed .app
        if: steps.mode.outputs.mode == 'devid'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat >build/exportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "build/CafeUp-$VERSION.xcarchive" \
            -exportPath "build/export-$VERSION" \
            -exportOptionsPlist build/exportOptions.plist

      - name: Stage ad-hoc-signed .app from archive
        if: steps.mode.outputs.mode == 'adhoc'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # No DevID cert available — copy the archive's already-built .app
          # into the same export-style directory the rest of the workflow
          # expects, then ensure the signature is clean ad-hoc with no
          # hardened-runtime flag (library validation otherwise rejects the
          # framework-vs-main Team ID mismatch at first launch).
          mkdir -p "build/export-$VERSION"
          ARCHIVE_APP="build/CafeUp-$VERSION.xcarchive/Products/Applications/CafeUp.app"
          cp -R "$ARCHIVE_APP" "build/export-$VERSION/CafeUp.app"
          APP="build/export-$VERSION/CafeUp.app"
          # Remove the existing signature first so re-signing doesn't inherit
          # the hardened-runtime option flag from the original archive sign.
          codesign --remove-signature "$APP" || true
          codesign --remove-signature "$APP/Contents/Frameworks/Sparkle.framework" || true
          codesign --force --sign - "$APP/Contents/Frameworks/Sparkle.framework"
          codesign --force --sign - "$APP"
          echo "ad-hoc re-sign complete:"
          codesign -dv "$APP" 2>&1 | grep -E "Identifier|Format|flags|TeamIdentifier"

      - name: Verify codesign integrity
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP="build/export-$VERSION/CafeUp.app"
          codesign --verify --strict --verbose=2 "$APP"
          codesign --verify --strict --verbose=2 "$APP/Contents/Frameworks/Sparkle.framework"

      - name: Notarize + staple
        if: steps.mode.outputs.mode == 'devid'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          APP="build/export-$VERSION/CafeUp.app"
          ZIP="build/CafeUp-$VERSION.zip"
          KEY_PATH="$RUNNER_TEMP/notary_key.p8"
          echo -n "$APPLE_API_KEY_P8_BASE64" | base64 --decode -o "$KEY_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_KEY_ISSUER" \
            --wait
          xcrun stapler staple "$APP"
          rm "$ZIP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          rm -f "$KEY_PATH"

      - name: Zip (ad-hoc path, no notarization)
        if: steps.mode.outputs.mode == 'adhoc'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP="build/export-$VERSION/CafeUp.app"
          ZIP="build/CafeUp-$VERSION.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"

      - name: EdDSA-sign the archive
        id: edsign
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          ZIP="build/CafeUp-$VERSION.zip"
          SIGN_UPDATE=$(find ~/Library/Developer/Xcode/DerivedData -name sign_update -type f | head -1)
          if [[ -z "$SIGN_UPDATE" ]]; then
            echo "sign_update not found" >&2; exit 1
          fi
          # Pipe the key via stdin so it never touches the disk.
          SIG_OUTPUT=$(printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$ZIP")
          ZIP_LENGTH=$(stat -f%z "$ZIP")
          echo "signature=$SIG_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "length=$ZIP_LENGTH" >> "$GITHUB_OUTPUT"
          echo "Signed: $SIG_OUTPUT (length $ZIP_LENGTH)"

      - name: Create GitHub Release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          MODE: ${{ steps.mode.outputs.mode }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP="build/CafeUp-$VERSION.zip"
          NOTES_FILE="release-notes/v$VERSION.md"
          # When ad-hoc, prepend a Gatekeeper note to the auto-generated
          # release body so end users know about the first-launch right-click.
          if [[ "$MODE" == "adhoc" ]]; then
            ADHOC_NOTE=$'> **Note:** This build is ad-hoc signed (not Apple Developer ID signed). The first time you launch CafeUp, macOS may show a Gatekeeper warning — right-click the app and choose **Open**, then **Open Anyway**. Subsequent launches and auto-updates work normally.\n\n'
          else
            ADHOC_NOTE=""
          fi
          if [[ -f "$NOTES_FILE" ]]; then
            BODY=$(printf '%s%s' "$ADHOC_NOTE" "$(cat "$NOTES_FILE")")
            gh release create "v$VERSION" "$ZIP" --title "CafeUp $VERSION" --notes "$BODY"
          else
            if [[ -n "$ADHOC_NOTE" ]]; then
              gh release create "v$VERSION" "$ZIP" --title "CafeUp $VERSION" --notes "$ADHOC_NOTE" --generate-notes
            else
              gh release create "v$VERSION" "$ZIP" --title "CafeUp $VERSION" --generate-notes
            fi
          fi

      - name: Update appcast.xml and commit back to main
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SIGNATURE: ${{ steps.edsign.outputs.signature }}
          ZIP_LENGTH: ${{ steps.edsign.outputs.length }}
        run: |
          BUILD_NUMBER=$(awk '/CURRENT_PROJECT_VERSION:/ {gsub(/"/, "", $2); print $2}' project.yml)
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v$VERSION/CafeUp-$VERSION.zip"

          NOTES_HTML=""
          NOTES_MD="release-notes/v$VERSION.md"
          if [[ -f "$NOTES_MD" ]]; then
            NOTES_HTML="<![CDATA[$(cat "$NOTES_MD")]]>"
          fi

          ITEM=$(cat <<EOF
              <item>
                <title>Version $VERSION</title>
                <sparkle:version>$BUILD_NUMBER</sparkle:version>
                <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <pubDate>$PUB_DATE</pubDate>
                <description>$NOTES_HTML</description>
                <enclosure url="$RELEASE_URL" length="$ZIP_LENGTH" type="application/octet-stream" $SIGNATURE/>
              </item>
          EOF
          )

          python3 - "$ITEM" <<'PY'
          import re, sys, pathlib
          item = sys.argv[1]
          path = pathlib.Path("docs/appcast.xml")
          text = path.read_text()
          new = re.sub(r"(\s*</channel>)", f"\n{item}\\1", text, count=1)
          path.write_text(new)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add docs/appcast.xml
          git commit -m "Publish appcast for v$VERSION [skip ci]"
          git push origin main
