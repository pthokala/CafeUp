name: CafeUp
options:
  bundleIdPrefix: com.pardhu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"

targets:
  CafeUp:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "Resources/CafeUp.entitlements"
          - "Resources/cafeup"
      # Shell script CLI bundled at CafeUp.app/Contents/Resources/cafeup.
      # Listed explicitly because xcodegen doesn't auto-classify extensionless files,
      # so without this it ends up as an orphan file reference with no build phase
      # and never gets copied into the bundle.
      - path: Sources/Resources/cafeup
        buildPhase: resources
        type: text.script.sh
    dependencies:
      - package: Sparkle
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleName: CafeUp
        CFBundleDisplayName: CafeUp
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 Pardhu. All rights reserved."
        SUFeedURL: "https://pthokala.github.io/CafeUp/appcast.xml"
        SUPublicEDKey: "OAE6wYuiNNZdDgvz4bl+mpQPYZc4nJvXPy08RmB2WwU="
        SUEnableAutomaticChecks: false
        SUAllowsAutomaticUpdates: false
        CFBundleURLTypes:
          - CFBundleURLName: com.pardhu.CafeUp.command
            CFBundleURLSchemes:
              - cafeup
    entitlements:
      path: Sources/Resources/CafeUp.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pardhu.CafeUp
        GENERATE_INFOPLIST_FILE: NO
        # Disabled while we ship ad-hoc-signed releases (no Apple Developer
        # Program membership yet). Hardened runtime forces Library Validation,
        # which rejects Sparkle.framework when the main app and the framework
        # don't share a Team ID — and ad-hoc binaries have no Team ID, so
        # nothing satisfies the check. Re-enable when DevID signing is
        # configured (notarization also requires it). See SPECS § 20.1.
        ENABLE_HARDENED_RUNTIME: NO

  CafeUpTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: CafeUp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.pardhu.CafeUpTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CafeUp.app/Contents/MacOS/CafeUp"
