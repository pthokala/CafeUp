name: CafeUp
options:
  bundleIdPrefix: com.pardhu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  CafeUp:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "Resources/CafeUp.entitlements"
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleName: CafeUp
        CFBundleDisplayName: CafeUp
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 Pardhu. All rights reserved."
    entitlements:
      path: Sources/Resources/CafeUp.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pardhu.CafeUp
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES

  CafeUpTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: CafeUp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.pardhu.CafeUpTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CafeUp.app/Contents/MacOS/CafeUp"
